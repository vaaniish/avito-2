name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - release/**
  workflow_dispatch:

env:
  DATABASE_URL: postgresql://user:password@127.0.0.1:5432/avito-db-dev?schema=public
  BASE_URL: http://127.0.0.1:3001
  PLAYWRIGHT_API_BASE_URL: http://127.0.0.1:3001/api
  PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
  PORT: 3001
  SESSION_TOKEN_SECRET: ci-session-secret-32-chars-minimum-123456
  SESSION_TOKEN_ISSUER: avito-2-backend
  SESSION_TOKEN_AUDIENCE: avito-2-frontend
  YOOKASSA_SHOP_ID: ci-shop
  YOOKASSA_SECRET_KEY: ci-secret
  YOOKASSA_WEBHOOK_TOKEN: ci-webhook-token
  YOOKASSA_WEBHOOK_IP_ALLOWLIST: 127.0.0.1
  HTTP_SLOW_REQUEST_MS: 1200

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build and preflight
        run: npm run ci:verify

  pr-gate:
    runs-on: ubuntu-latest
    needs: quality
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: avito-db-dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U user -d avito-db-dev"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Apply migrations
        run: npm run db:migrate:deploy

      - name: Seed DB
        run: npm run db:seed

      - name: Start backend
        run: |
          nohup npm run start:dev > /tmp/backend.log 2>&1 &
          echo $! > /tmp/backend.pid

      - name: Wait for readiness
        run: |
          for i in {1..60}; do
            if curl -fsS "http://127.0.0.1:3001/health/ready" >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Backend did not become ready in time"
          cat /tmp/backend.log || true
          exit 1

      - name: Run PR gate suites
        run: npm run ci:gate:pr

      - name: Dump backend log on failure
        if: failure()
        run: cat /tmp/backend.log || true

      - name: Stop backend
        if: always()
        run: |
          if [ -f /tmp/backend.pid ]; then
            kill "$(cat /tmp/backend.pid)" || true
          fi

  main-gate:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: pr-gate
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: avito-db-dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U user -d avito-db-dev"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Apply migrations
        run: npm run db:migrate:deploy

      - name: Seed DB
        run: npm run db:seed

      - name: Run main gate suites
        run: npm run ci:gate:main

  pre-release-gate:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: main-gate
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: avito-db-dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U user -d avito-db-dev"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Apply migrations
        run: npm run db:migrate:deploy

      - name: Seed DB
        run: npm run db:seed

      - name: Run pre-release gate
        run: npm run ci:gate:pre-release
